services:
  app:
    build: .
    container_name: rss_reader_app
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /root/.cache/go-build
    volumes:
      - .:/app
      - /app/tmp
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    container_name: rss_reader_db
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

volumes:
  pgdata:
  go-mod-cache:
  go-build-cache:


networks:
  app-network:


