# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: ja-JP

reviews:
  profile: chill
  high_level_summary: true
  review_status: true
  poem: false
  request_changes_workflow: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!backend/internal/infra/persistence/postgres/generated/**"
    - "!**/*.gen.go"
    - "!**/go.sum"
    - "!pnpm-lock.yaml"
    - "!**/node_modules/**"

  path_instructions:
    - path: "backend/internal/handler/**"
      instructions: |
        ハンドラは echo.NewHTTPError やステータスコードの直書きをせず、
        apperror.AppError を返すこと。入力のバインド/検証は requestValidator で行う。

  tools:
    golangci-lint:
      enabled: true
      config_file: backend/.golangci.yaml

chat:
  auto_reply: true

# レビュー指針として CLAUDE.md を読ませる。
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
