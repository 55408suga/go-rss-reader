name: Setup Frontend
description: "Setup frontend (Node + pnpm) and install workspace dependencies"

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        version: 11.0.9

    - name: Set up Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    # Container jobs run as root while the checkout is owned by the runner user,
    # which makes git refuse commands ("dubious ownership", exit 128) — this
    # breaks the `prepare` lifecycle script during install. Harmless elsewhere.
    - name: Trust the workspace
      shell: bash
      run: git config --global --add safe.directory "${GITHUB_WORKSPACE:-$PWD}"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
