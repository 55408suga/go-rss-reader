name: Setup Backend
description: "Setup backend (Go)"

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ env.BACKEND_DIR }}/go.mod
        cache-dependency-path: ${{ env.BACKEND_DIR }}/go.sum
