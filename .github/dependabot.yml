version: 2
updates:
    - package-ecosystem: "gomod"
      directory: "/backend"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
          timezone: "Asia/Tokyo"
      open-pull-requests-limit: 3
      commit-message:
          prefix: "chore"
      labels:
          - "dependencies"
          - "backend"
      groups:
          go-pkgs:
              patterns:
                  - "*"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
          timezone: "Asia/Tokyo"
      open-pull-requests-limit: 3
      commit-message:
          prefix: "ci"
      labels:
          - "dependencies"
          - "github-actions"
      groups:
          github-actions:
              patterns:
                  - "*"
