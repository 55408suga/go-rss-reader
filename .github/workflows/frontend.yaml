name: Frontend

on:
    workflow_dispatch:
    push:
        branches:
            - main
    pull_request:
        paths:
            - "frontend/**"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - ".github/workflows/frontend.yaml"
            - ".github/actions/setup-frontend/**"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: eslint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                # Read-only CI (lint/typecheck/test/build); no authenticated git
                # ops, so don't leave the token in the runner's git config.
                persist-credentials: false

            - name: Set up frontend
              uses: ./.github/actions/setup-frontend

            - name: Run eslint
              run: pnpm --filter frontend lint

    typecheck:
        name: tsc
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                # Read-only CI (lint/typecheck/test/build); no authenticated git
                # ops, so don't leave the token in the runner's git config.
                persist-credentials: false

            - name: Set up frontend
              uses: ./.github/actions/setup-frontend

            - name: Run tsc
              run: pnpm --filter frontend typecheck

    test:
        name: vitest
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                # Read-only CI (lint/typecheck/test/build); no authenticated git
                # ops, so don't leave the token in the runner's git config.
                persist-credentials: false

            - name: Set up frontend
              uses: ./.github/actions/setup-frontend

            - name: Run vitest
              run: pnpm --filter frontend test

    e2e:
        name: playwright
        runs-on: ubuntu-latest
        # Official image ships the matching browsers + OS deps preinstalled
        # (PLAYWRIGHT_BROWSERS_PATH=/ms-playwright), so no slow install-deps step.
        container:
            image: mcr.microsoft.com/playwright:v1.49.1-noble
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                # Read-only CI (lint/typecheck/test/build); no authenticated git
                # ops, so don't leave the token in the runner's git config.
                persist-credentials: false

            - name: Set up frontend
              uses: ./.github/actions/setup-frontend

            - name: Run Playwright (API mocked, no backend needed)
              run: pnpm --filter frontend test:e2e

    build:
        name: next build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                # Read-only CI (lint/typecheck/test/build); no authenticated git
                # ops, so don't leave the token in the runner's git config.
                persist-credentials: false

            - name: Set up frontend
              uses: ./.github/actions/setup-frontend

            - name: Run next build
              run: pnpm --filter frontend build
