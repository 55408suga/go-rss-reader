version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infra/persistence/postgres/query.sql"
    schema: "internal/infra/persistence/postgres/schema.sql"
    gen:
      go:
        package: "generated"
        out: "internal/infra/persistence/postgres/generated"
        sql_package: "pgx/v5"
        emit_prepared_queries: false
        overrides:
          - db_type: uuid
            go_type:
              import: "github.com/google/uuid"
              type: UUID
          - db_type: pg_catalog.timestamptz
            go_type:
              import: "time"
              type: "Time"
