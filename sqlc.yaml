version: "2"
overrides:
  go:
    overrides:
      - db_type: uuid
        go_type:
          import: "github.com/google/uuid"
          type: UUID
sql:
  - engine: "postgresql"
    queries: "internal/infra/persistence/postgres/sql/query.sql"
    schema: "internal/infra/persistence/postgres/sql/schema.sql"
    gen:
      go:
        package: "generated"
        out: "internal/infra/persistence/postgres/generated"
        sql_package: "pgx/v5"
        emit_prepared_queries: false
        emit_empty_slices: true
        overrides:
          - db_type: pg_catalog.timestamptz
            go_type:
              import: "time"
              type: "Time"
          - db_type: pg_catalog.timestamptz
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: text
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: pg_catalog.uuid
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: pg_catalog.int4
            go_type:
              type: "int"
