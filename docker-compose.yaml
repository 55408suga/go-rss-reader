services:
  app:
    build: .
    container_name: rss_reader_app
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: rss_reader_db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:


