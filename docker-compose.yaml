services:
  app:
    build: .
    container_name: rss_reader_app
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
    volumes:
      - .:/app
      - /app/tmp
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: rss_reader_db
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:


