version: "2"
run:
    timeout: 5m
    tests: false
    allow-serial-runners: true
    concurrency: 0
    go: "1.25"
linters:
    default: none
    enable:
        - bodyclose
        - contextcheck
        - copyloopvar
        - errcheck
        - errname
        - errorlint
        - exhaustive
        - gocritic
        - gosec
        - govet
        - ineffassign
        - intrange
        - lll
        - misspell
        - noctx
        - perfsprint
        - revive
        - rowserrcheck
        - sqlclosecheck
        - staticcheck
        - unconvert
        - unparam
        - unused
    settings:
        exhaustive:
            default-signifies-exhaustive: true
        gocritic:
            enabled-tags:
                - diagnostic
                - experimental
                - opinionated
                - performance
                - style
        lll:
            line-length: 120
            tab-width: 4
        misspell:
            locale: US
    exclusions:
        generated: lax
        presets:
            - comments
            - common-false-positives
            - legacy
            - std-error-handling

formatters:
    enable:
        - gofumpt
        - gci
    settings:
        gofumpt:
            extra-rules: false
            module-path: rss_reader
        gci:
            sections:
                - standard
                - default
                - prefix(rss_reader)
            custom-order: true
    exclusions:
        generated: lax
